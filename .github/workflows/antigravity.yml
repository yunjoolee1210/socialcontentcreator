name: Antigravity Maintenance

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  maintain:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install
      - run: npm run lint
      - run: npm run type-check
      - run: npm run test --if-present

      - name: Antigravity AI Review
        run: npm run antigravity:review
